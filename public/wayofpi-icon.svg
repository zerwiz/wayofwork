<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="WoP">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="55%" stop-color="#6b21a8"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Squircle -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#shine)"/>
  <!-- Literal “WoP” = Way of Pi (capital W, lowercase o, capital P) -->
  <text
    x="256"
    y="274"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="DejaVu Sans, Liberation Sans, Noto Sans, system-ui, -apple-system, 'Segoe UI', Cantarell, sans-serif"
    font-weight="700"
    font-size="140"
    letter-spacing="0.06em"
    fill="#ffffff"
    stroke="#1a0d3d"
    stroke-width="5"
    paint-order="stroke fill"
  >WoP</text>
</svg>
